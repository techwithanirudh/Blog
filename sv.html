<script src="https://huningxin.github.io/opencv.js/build/wasm/opencv.js"></script>
<script>
  let videoWidth, videoHeight;
  let streaming = false;
  let multi_face_capture_active = document.getElementById(
    "multi_face_capture_active"
  ).value;
  let camera_active = document.getElementById("camera_active").value;
  let video = document.getElementById("video");
  let canvasOutput = document.getElementById("canvasOutput");
  let canvasOutputCtx = canvasOutput.getContext("2d");
  let stream = null;
  let detectFace = document.getElementById("face");
  let detectEye = document.getElementById("eye");
  function startCamera() {
    if (streaming) return;
    navigator.mediaDevices
      .getUserMedia({ video: true, audio: false })
      .then(function (s) {
        stream = s;
        video.srcObject = s;
        video.play();
      })
      .catch(function (err) {
        console.log("An error occured! " + err);
      });
    video.addEventListener(
      "canplay",
      function (ev) {
        if (!streaming) {
          videoWidth = video.videoWidth;
          videoHeight = video.videoHeight;
          video.setAttribute("width", videoWidth);
          video.setAttribute("height", videoHeight);
          canvasOutput.width = videoWidth;
          canvasOutput.height = videoHeight;
          streaming = true;
        }
        startVideoProcessing();
      },
      false
    );
  }
  let faceClassifier = null;
  let eyeClassifier = null;
  let src = null;
  let dstC1 = null;
  let dstC3 = null;
  let dstC4 = null;
  let canvasInput = null;
  let canvasInputCtx = null;
  let canvasBuffer = null;
  let canvasBufferCtx = null;
  let frames = 0;
  function startVideoProcessing() {
    if (!streaming) {
      console.warn("Please startup your webcam");
      return;
    }
    stopVideoProcessing();
    canvasInput = document.createElement("canvas");
    canvasInput.width = videoWidth;
    canvasInput.height = videoHeight;
    canvasInputCtx = canvasInput.getContext("2d");
    canvasBuffer = document.createElement("canvas");
    canvasBuffer.width = videoWidth;
    canvasBuffer.height = videoHeight;
    canvasBufferCtx = canvasBuffer.getContext("2d");
    srcMat = new cv.Mat(videoHeight, videoWidth, cv.CV_8UC4);
    grayMat = new cv.Mat(videoHeight, videoWidth, cv.CV_8UC1);
    faceClassifier = new cv.CascadeClassifier();
    faceClassifier.load("haarcascade_frontalface_default.xml");
    eyeClassifier = new cv.CascadeClassifier();
    eyeClassifier.load("haarcascade_eye.xml");
    requestAnimationFrame(processVideo);
  }
  function processVideo() {
    stats.begin();
    canvasInputCtx.drawImage(video, 0, 0, videoWidth, videoHeight);
    let imageData = canvasInputCtx.getImageData(0, 0, videoWidth, videoHeight);
    srcMat.data.set(imageData.data);
    cv.cvtColor(srcMat, grayMat, cv.COLOR_RGBA2GRAY);
    let faces = [];
    let eyes = [];
    let size;
    if (detectFace.checked) {
      let faceVect = new cv.RectVector();
      let faceMat = new cv.Mat();
      if (detectEye.checked) {
        cv.pyrDown(grayMat, faceMat);
        size = faceMat.size();
      } else {
        cv.pyrDown(grayMat, faceMat);
        cv.pyrDown(faceMat, faceMat);
        size = faceMat.size();
      }
      faceClassifier.detectMultiScale(faceMat, faceVect);
      console.log(faceVect.size());
      if (faceVect.size() > 1) {
        frames++;
      } else {
        frames = 0;
      }
      if (frames > 300 && multi_face_capture_active == 1) {
        frames = 0;
        console.log("Two faces detected." + frames);
        const canvas = (window.canvas = document.querySelector("canvas"));
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas
          .getContext("2d")
          .drawImage(video, 0, 0, canvas.width, canvas.height);
        var mimeType = "image/jpeg";
        var dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        var test_id = $("#test_id").val();
        var school_id = $("#school_id").val();
        var student_id = $("#student_id").val();
        var enc_student_id = $("#enc_student_id").val();
        var enc_school_id = $("#enc_school_id").val();
        var enc_test_id = $("#enc_test_id").val();
        var mres = dataUrl.split(":");
        console.log("captured Img= " + dataUrl + "=" + mres[1]);
        if (mres[1] != ",") {
          canvas.toBlob((blob) => {
            const reader = new FileReader();
            reader.addEventListener("loadend", (evt) => {
              const arrayBuffer = evt.target.result;
              const blob = new Blob([arrayBuffer], { type: mimeType });
            });
            reader.readAsArrayBuffer(blob);
            reader.onload = function (evt) {
              var text = evt.target.result;
              APP.myfaceData = text;
              console.log(text);
            };
          }, mimeType);
          callTest2(
            test_id,
            school_id,
            student_id,
            enc_student_id,
            enc_school_id,
            enc_test_id
          );
        }
      }
      for (let i = 0; i < faceVect.size(); i++) {
        let face = faceVect.get(i);
        faces.push(new cv.Rect(face.x, face.y, face.width, face.height));
        if (detectEye.checked) {
          let eyeVect = new cv.RectVector();
          let eyeMat = faceMat.getRoiRect(face);
          eyeClassifier.detectMultiScale(eyeMat, eyeVect);
          for (let i = 0; i < eyeVect.size(); i++) {
            let eye = eyeVect.get(i);
            eyes.push(
              new cv.Rect(face.x + eye.x, face.y + eye.y, eye.width, eye.height)
            );
          }
          eyeMat.delete();
          eyeVect.delete();
        }
      }
      faceMat.delete();
      faceVect.delete();
    } else {
      if (detectEye.checked) {
        let eyeVect = new cv.RectVector();
        let eyeMat = new cv.Mat();
        cv.pyrDown(grayMat, eyeMat);
        size = eyeMat.size();
        eyeClassifier.detectMultiScale(eyeMat, eyeVect);
        for (let i = 0; i < eyeVect.size(); i++) {
          let eye = eyeVect.get(i);
          eyes.push(new cv.Rect(eye.x, eye.y, eye.width, eye.height));
        }
        eyeMat.delete();
        eyeVect.delete();
      }
    }
    canvasOutputCtx.drawImage(canvasInput, 0, 0, videoWidth, videoHeight);
    drawResults(canvasOutputCtx, faces, "red", size);
    drawResults(canvasOutputCtx, eyes, "yellow", size);
    stats.end();
    requestAnimationFrame(processVideo);
  }
  var face_captured_img_count = 1;
  function callTest2(
    test_id,
    school_id,
    student_id,
    enc_student_id,
    enc_school_id,
    enc_test_id
  ) {
    var mm = Math.random().toString(36).substring(7) + new Date().getTime();
    var filename =
      face_captured_img_count +
      mm +
      test_id +
      "_" +
      student_id +
      "_student.jpg";
    var filetype = "image/jpeg";
    var myHeaders = new Headers();
    myHeaders.append("Content-Type", "application/json");
    var raw = JSON.stringify({ fileName: filename, fileType: filetype });
    var requestOptions = {
      method: "GET",
      headers: myHeaders,
      redirect: "follow",
    };
    fetch(
      "https://nnq68tibp0.execute-api.ap-south-1.amazonaws.com/dre/fhfgf?fileName=online_assessment/face_captured_photo/" +
        enc_student_id +
        "/" +
        enc_test_id +
        "/" +
        filename +
        "&fileType=" +
        filetype +
        "&bucket=entrarschool" +
        school_id +
        ""
    )
      .then((response) => response.text())
      .then((result) => {
        var url = result;
        console.log("Multi Face URL: " + url);
        fileUpload2(url, filetype);
      })
      .catch((error) => console.log("error1", error));
    face_captured_img_count++;
  }
  function fileUpload2(url, filetype) {
    var myHeaders = new Headers();
    myHeaders.append("Content-Type", filetype);
    var requestOptions = {
      method: "PUT",
      headers: myHeaders,
      body: APP.myfaceData,
      redirect: "follow",
    };
    fetch(url, requestOptions)
      .then((response) => response.text())
      .then((result) => console.log(result))
      .catch((error) => console.log("error2", error));
  }
  function drawResults(ctx, results, color, size) {
    for (let i = 0; i < results.length; ++i) {
      let rect = results[i];
      let xRatio = videoWidth / size.width;
      let yRatio = videoHeight / size.height;
      ctx.lineWidth = 3;
      ctx.strokeStyle = color;
      ctx.strokeRect(
        rect.x * xRatio,
        rect.y * yRatio,
        rect.width * xRatio,
        rect.height * yRatio
      );
    }
  }
  function stopVideoProcessing() {
    if (src != null && !src.isDeleted()) src.delete();
    if (dstC1 != null && !dstC1.isDeleted()) dstC1.delete();
    if (dstC3 != null && !dstC3.isDeleted()) dstC3.delete();
    if (dstC4 != null && !dstC4.isDeleted()) dstC4.delete();
  }
  function stopCamera() {
    if (!streaming) return;
    stopVideoProcessing();
    document
      .getElementById("canvasOutput")
      .getContext("2d")
      .clearRect(0, 0, width, height);
    video.pause();
    video.srcObject = null;
    stream.getVideoTracks()[0].stop();
    streaming = false;
  }
  function initUI() {
    stats = new Stats();
    stats.showPanel(0);
    document.getElementById("container").appendChild(stats.dom);
  }
  function opencvIsReady() {
    console.log("OpenCV.js is ready");
    initUI();
    if (camera_active == 1) startCamera();
  }
  function saveImage() {
    let downloadLink = document.createElement("a");
    downloadLink.setAttribute("download", "CanvasAsImage.png");
    let canvas = canvasInput;
    let dataURL = canvas.toDataURL("image/png");
    let url = dataURL.replace(
      /^data:image\/png/,
      "data:application/octet-stream"
    );
    downloadLink.setAttribute("href", url);
    downloadLink.click();
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fecha/2.3.1/fecha.min.js"></script>

<script>
  var Module = {
    wasmBinaryFile:
      "https://huningxin.github.io/opencv.js/build/wasm/opencv_js.wasm",
    preRun: [
      function () {
        Module.FS_createPreloadedFile(
          "/",
          "haarcascade_eye.xml",
          "https://raw.githubusercontent.com/opencv/opencv/master/data/haarcascades/haarcascade_eye.xml",
          true,
          false
        );
        Module.FS_createPreloadedFile(
          "/",
          "haarcascade_frontalface_default.xml",
          "https://raw.githubusercontent.com/opencv/opencv/master/data/haarcascades/haarcascade_frontalface_default.xml",
          true,
          false
        );
        Module.FS_createPreloadedFile(
          "/",
          "haarcascade_profileface.xml",
          "https://raw.githubusercontent.com/opencv/opencv/master/data/haarcascades/haarcascade_profileface.xml",
          true,
          false
        );
      },
    ],
    _main: function () {
      opencvIsReady();
    },
  };

  window.setInterval(function () {
    const canvas = (window.canvas = document.querySelector("canvas"));

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
    var mimeType = "image/jpeg";
    var dataUrl = canvas.toDataURL("image/jpeg", 0.85);
    var cres = dataUrl.split(":");

    //console.log('captured Img= '+dataUrl+'='+cres[1]);
    if (cres[1] != ",") {
      // Convert canvas to Blob, then Blob to ArrayBuffer.
      canvas.toBlob((blob) => {
        const reader = new FileReader();
        reader.addEventListener("loadend", (evt) => {
          const arrayBuffer = evt.target.result;
          // bufferByteLen.textContent = arrayBuffer.byteLength + ' bytes.';

          // Dispay Blob content in an Image.
          const blob = new Blob([arrayBuffer], { type: mimeType });
          //APP.myfileData = URL.createObjectURL(blob);
        });
        reader.readAsArrayBuffer(blob);
        reader.onload = function (evt) {
          var text = evt.target.result;
          APP.myfileData = text;
        };
      }, mimeType);

      var test_id = $("#test_id").val();
      var school_id = $("#school_id").val();
      var student_id = $("#student_id").val();

      var enc_student_id = $("#enc_student_id").val();
      var enc_school_id = $("#enc_school_id").val();
      var enc_test_id = $("#enc_test_id").val();

      //file upload in s3 bucket
      callTest(
        test_id,
        school_id,
        student_id,
        enc_student_id,
        enc_school_id,
        enc_test_id
      );
    }
  }, camera_capture_time); // 20 sec
</script>
